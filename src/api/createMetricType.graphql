mutation createMetricType(
  $input: CreateMetricTypeInput = {
    colorCode: ""
    displayDecimals: 10
    displayUnit: CURRENCY
    granularity: FIFTEEN_MINUTE
    icon: ""
    name: ""
    type: COST
    metricTypeCategories: {
      isEditable: false
      name: ""
      showInPeriods: CURRENT
      type: ACTUAL
    }
  }
) {
  jobdoneCustom1 {
    createMetricType(input: $input) {
      colorCode
      displayDecimals
      displayUnit
      granularity
      icon
      id
      name
      type
    }
  }
}
